{% load static %}
<div class="sidebar-inner">

  <!-- Logo -->
  <div class="sb-logo">
    <img src="{% static 'images/logo.png' %}" alt="Logo">
    <div class="sb-logo-text">
      <div class="sb-logo-title">Magasin Crème</div>
      <div class="sb-logo-sub">Gestion Industrielle</div>
    </div>
  </div>

  <!-- Navigation -->
  <nav>
    <div class="sb-section">Principal</div>

    <a href="{% url 'dashboard' %}"
       class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>

    <div class="sb-section">Opérations</div>

    <a href="{% url 'reception_new' %}"
       class="{% if request.resolver_match.url_name == 'reception_new' %}active{% endif %}">
      <i class="bi bi-truck"></i> Nouvelle réception
    </a>

    <a href="{% url 'transfert' %}"
       class="{% if request.resolver_match.url_name == 'transfert' %}active{% endif %}">
      <i class="bi bi-arrow-left-right"></i> Nouveau transfert
    </a>

    <div class="sb-section">Historique</div>

    <a href="{% url 'reception_list' %}"
       class="{% if request.resolver_match.url_name == 'reception_list' or request.resolver_match.url_name == 'reception_detail' or request.resolver_match.url_name == 'reception_update' %}active{% endif %}">
      <i class="bi bi-clock-history"></i> Historique réceptions
    </a>

    <a href="{% url 'transfert_list' %}"
       class="{% if request.resolver_match.url_name == 'transfert_list' or request.resolver_match.url_name == 'transfert_detail' or request.resolver_match.url_name == 'transfert_update' %}active{% endif %}">
      <i class="bi bi-clock-history"></i> Historique transferts
    </a>

    <div class="sb-section">Stock</div>

    <a href="{% url 'stock' %}"
       class="{% if request.resolver_match.url_name == 'stock' %}active{% endif %}">
      <i class="bi bi-boxes"></i> Stock actuel
    </a>

    <div class="sb-section">Compte</div>

    <a href="{% url 'profile' %}"
       class="{% if request.resolver_match.url_name == 'profile' %}active{% endif %}">
      <i class="bi bi-person-circle"></i> Mon profil
    </a>

    {% if request.user.is_superuser %}
    <a href="/admin/" target="_blank">
      <i class="bi bi-gear"></i> Admin Django
    </a>
    {% endif %}
  </nav>

  <!-- Logout -->
  <div class="sb-logout">
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit">
        <i class="bi bi-box-arrow-right"></i> Déconnexion
      </button>
    </form>
  </div>

</div>
